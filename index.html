<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambient OS | V2.5</title>
  <style>
    :root {
      --bg-main: #050505;
      --bg-panel: rgba(15, 15, 18, 0.9);
      --text-p: #ffffff;
      --text-s: #888888;
      --accent: #00c6ff;
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --clock-inner: #0f0f13;
    }

    body.light-mode {
      --bg-main: #f4f4f5;
      --bg-panel: rgba(245, 245, 245, 0.95);
      --text-p: #111111;
      --text-s: #666666;
      --glass: rgba(0, 0, 0, 0.04);
      --border: rgba(0, 0, 0, 0.1);
      --clock-inner: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: var(--bg-main); color: var(--text-p);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      overflow: hidden; user-select: none; transition: background 0.4s;
    }

    /* --- Side Panels & Tabs --- */
    .side-panel {
      position: fixed; top: 0; height: 100%; width: 320px; 
      background: var(--bg-panel); backdrop-filter: blur(25px);
      z-index: 1000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      padding: 30px; overflow-y: auto;
    }
    .panel-right { right: 0; transform: translateX(calc(100% - 40px)); border-left: 1px solid var(--border); }
    .panel-left { left: 0; transform: translateX(calc(-100% + 40px)); border-right: 1px solid var(--border); }
    .side-panel:hover { transform: translateX(0); }

    .panel-tab {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 20px; color: var(--text-s); opacity: 0.6; pointer-events: none;
    }
    .panel-right .panel-tab { left: 12px; }
    .panel-left .panel-tab { right: 12px; }
    .side-panel:hover .panel-tab { opacity: 0; }

    /* --- Toggle Sliders --- */
    .toggle-container {
      display: flex; background: var(--glass); border-radius: 20px;
      padding: 4px; position: relative; margin-top: 10px; border: 1px solid var(--border);
    }
    .toggle-btn {
      flex: 1; text-align: center; padding: 6px; font-size: 0.75rem;
      cursor: pointer; z-index: 2; transition: color 0.3s; color: var(--text-s);
    }
    .toggle-btn.active { color: white; }
    .slider {
      position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px);
      background: var(--accent); border-radius: 18px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
    }
    .rtl-slide { transform: translateX(100%); }

    /* --- Clock Design (Original Refined) --- */
    .clock-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
    #clockSvg { width: 400px; height: 400px; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5)); }
    .analog-hand { stroke-linecap: round; transform-origin: 200px 200px; }
    
    .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
    .theme-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .theme-dot.active { border-color: var(--text-p); transform: scale(1.1); }

    /* --- Media Player --- */
    #mediaWidget { top: 40px; left: 40px; width: 300px; padding: 15px; border-radius: 12px; background: var(--bg-panel); border: 1px solid var(--border); }
    #npArt { width: 50px; height: 50px; border-radius: 6px; background: #222; }

    /* Accordion */
    .acc-header { padding: 15px 0; border-top: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-s); }
    .acc-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .acc-content.open { max-height: 400px; padding-bottom: 20px; }

  </style>
</head>
<body id="mainBody">

  <!-- Left Panel -->
  <div class="side-panel panel-left">
    <div class="panel-tab">›</div>
    <h3 style="margin-bottom:20px; font-size:0.9rem; letter-spacing:1px;">SCHEDULE</h3>
    <input type="text" id="taskName" placeholder="New task..." style="margin-bottom:10px;">
    <div style="display:flex; gap:5px; margin-bottom:20px;">
        <input type="time" id="taskTime">
        <button onclick="addTask()" style="width:60px;">ADD</button>
    </div>
    <ul id="taskList" style="list-style:none;"></ul>
  </div>

  <!-- Right Panel -->
  <div class="side-panel panel-right">
    <div class="panel-tab">‹</div>
    
    <div class="acc-header" onclick="toggleAcc(this)">SYSTEM <span>▾</span></div>
    <div class="acc-content open">
      <label style="font-size:0.7rem;">LANGUAGE</label>
      <div class="toggle-container">
        <div id="langSlider" class="slider"></div>
        <div class="toggle-btn" onclick="setLang('en')">EN</div>
        <div class="toggle-btn" onclick="setLang('ar')">AR</div>
      </div>

      <label style="font-size:0.7rem; display:block; margin-top:15px;">DISPLAY MODE</label>
      <div class="toggle-container">
        <div id="modeSlider" class="slider"></div>
        <div class="toggle-btn" onclick="setMode('dark')">DARK</div>
        <div class="toggle-btn" onclick="setMode('light')">LIGHT</div>
      </div>
    </div>

    <div class="acc-header" onclick="toggleAcc(this)">APPEARANCE <span>▾</span></div>
    <div class="acc-content">
      <div class="theme-grid" id="themeGrid"></div>
    </div>

    <div class="acc-header" onclick="toggleAcc(this)">MEDIA <span>▾</span></div>
    <div class="acc-content">
        <button onclick="loginSpotify()" style="background:#1DB954; color:white; border:none; margin-bottom:10px;">SPOTIFY LOGIN</button>
        <input type="text" id="ytUrl" placeholder="YouTube Link..." onchange="loadYT(this.value)">
    </div>
  </div>

  <!-- Clock Container -->
  <div class="clock-container">
    <svg id="clockSvg" viewBox="0 0 400 400">
      <defs>
        <linearGradient id="timerGrad"><stop offset="0%" stop-color="var(--accent)"/><stop offset="100%" stop-color="white"/></linearGradient>
      </defs>
      <!-- Original Clock Face -->
      <circle cx="200" cy="200" r="170" fill="var(--glass)" stroke="var(--border)" stroke-width="4" />
      <circle cx="200" cy="200" r="154" fill="var(--clock-inner)" />
      
      <!-- Ticks -->
      <g id="ticks"></g>

      <!-- Analog Hands -->
      <line id="hourHand" class="analog-hand" x1="200" y1="200" x2="200" y2="120" stroke="var(--text-p)" stroke-width="5" />
      <line id="minHand" class="analog-hand" x1="200" y1="200" x2="200" y2="80" stroke="var(--text-p)" stroke-width="3" />
      <line id="secHand" class="analog-hand" x1="200" y1="200" x2="200" y2="70" stroke="var(--accent)" stroke-width="1.5" />

      <!-- Timer Ring (Hover) -->
      <path id="timerArc" style="opacity:0;" fill="none" stroke="url(#timerGrad)" stroke-width="8" stroke-linecap="round" />

      <!-- Labels -->
      <text x="200" y="60" text-anchor="middle" fill="var(--text-s)" font-size="14" font-weight="bold">12</text>
      <text id="digitalClock" x="200" y="95" text-anchor="middle" fill="var(--text-p)" font-size="22" font-weight="bold">00:00</text>
      
      <text id="countdownText" x="200" y="215" text-anchor="middle" fill="var(--text-p)" font-size="48" font-weight="bold" style="opacity:0;">00:00</text>
    </svg>
  </div>

  <!-- Floating Media -->
  <div id="mediaWidget" class="draggable">
    <div style="display:flex; gap:12px; align-items:center;">
        <img id="npArt" src="">
        <div>
            <div id="npTrack" style="font-size:0.85rem; font-weight:bold;">Inactive</div>
            <div id="npArtist" style="font-size:0.7rem; color:var(--text-s);">Spotify</div>
        </div>
    </div>
  </div>

  <script>
    // Security
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Setup
    let accent = localStorage.getItem('accent') || '#00c6ff';
    let currentMode = localStorage.getItem('idleMode') || 'dark';
    let currentLang = localStorage.getItem('idleLang') || 'en';

    function setMode(mode) {
      currentMode = mode;
      localStorage.setItem('idleMode', mode);
      document.body.classList.toggle('light-mode', mode === 'light');
      document.getElementById('modeSlider').style.transform = mode === 'light' ? 'translateX(100%)' : 'translateX(0)';
    }

    function setLang(l) {
      currentLang = l;
      localStorage.setItem('idleLang', l);
      document.body.dir = l === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('langSlider').style.transform = l === 'ar' ? 'translateX(100%)' : 'translateX(0)';
    }

    // Appearance Dots
    const colors = ['#00c6ff', '#ff758c', '#ffffff', '#ff4757', '#8E2DE2', '#0ba360', '#f12711', '#00F260'];
    const grid = document.getElementById('themeGrid');
    colors.forEach(c => {
      const d = document.createElement('div');
      d.className = 'theme-dot';
      d.style.background = c;
      if(c === accent) d.classList.add('active');
      d.onclick = () => {
          document.querySelectorAll('.theme-dot').forEach(x => x.classList.remove('active'));
          d.classList.add('active');
          document.documentElement.style.setProperty('--accent', c);
          localStorage.setItem('accent', c);
      };
      grid.appendChild(d);
    });

    // Clock Engine
    function drawTicks() {
      const g = document.getElementById('ticks');
      for(let i=0; i<60; i++) {
        const ang = i * 6;
        const isHour = i % 5 === 0;
        const r1 = isHour ? 158 : 162;
        const x1 = 200 + r1 * Math.cos((ang-90)*Math.PI/180);
        const y1 = 200 + r1 * Math.sin((ang-90)*Math.PI/180);
        const x2 = 200 + 168 * Math.cos((ang-90)*Math.PI/180);
        const y2 = 200 + 168 * Math.sin((ang-90)*Math.PI/180);
        const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
        l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
        l.setAttribute("stroke", isHour ? "var(--text-s)" : "var(--border)");
        l.setAttribute("stroke-width", isHour ? 2 : 1);
        g.appendChild(l);
      }
    }

    function tick() {
      const now = new Date();
      const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
      
      document.getElementById('secHand').setAttribute('transform', `rotate(${s*6})`);
      document.getElementById('minHand').setAttribute('transform', `rotate(${m*6})`);
      document.getElementById('hourHand').setAttribute('transform', `rotate(${(h%12)*30 + m/2})`);
      
      const hh = h % 12 || 12;
      const mm = m.toString().padStart(2,'0');
      document.getElementById('digitalClock').textContent = `${hh}:${mm}`;
      
      requestAnimationFrame(tick);
    }

    function toggleAcc(el) {
      el.nextElementSibling.classList.toggle('open');
    }

    // Init
    drawTicks();
    tick();
    setMode(currentMode);
    setLang(currentLang);
    document.documentElement.style.setProperty('--accent', accent);
  </script>
</body>
</html>
