<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Ambient Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* --- Dynamic Color Variables --- */
    :root {
      --bg-color-main: #050505;
      --bg-color-panel: rgba(15, 15, 18, 0.85);
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.1);
      --clock-bg: #0a0a0c;
      --clock-stroke: #111111;
      --clock-inner: #0f0f13;
      --now-playing-bg: rgba(15, 15, 18, 0.6);
      --sp-btn-color: #aaaaaa;
      --accent: #00c6ff;
    }

    body.light-mode {
      --bg-color-main: #f4f4f5;
      --bg-color-panel: rgba(255, 255, 255, 0.85);
      --text-primary: #111111;
      --text-secondary: #666666;
      --input-bg: rgba(0,0,0,0.04);
      --input-border: rgba(0,0,0,0.1);
      --clock-bg: #e5e5e5;
      --clock-stroke: #d0d0d0;
      --clock-inner: #f0f0f0;
      --now-playing-bg: rgba(255, 255, 255, 0.7);
      --sp-btn-color: #666666;
    }

    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at top, rgba(120, 120, 120, 0.05), transparent 40%), var(--bg-color-main);
      color: var(--text-primary); overflow: hidden; user-select: none; transition: direction 0.3s ease, background-color 0.4s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* --- Toggle Sliders --- */
    .toggle-container {
      display: flex; background: var(--input-bg); border-radius: 12px;
      padding: 4px; position: relative; margin-top: 10px; border: 1px solid var(--input-border);
    }
    .toggle-opt {
      flex: 1; text-align: center; padding: 8px; font-size: 0.75rem;
      cursor: pointer; z-index: 2; transition: color 0.3s; color: var(--text-secondary);
      font-weight: bold;
    }
    .toggle-opt.active { color: white; }
    .toggle-slider {
      position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px);
      background: var(--accent); border-radius: 10px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
    }
    body[dir="rtl"] .toggle-slider.lang-slide { transform: translateX(100%); }
    .mode-slide-right { transform: translateX(100%); }

    /* --- Side Panel --- */
    .side-panel {
      position: fixed; right: 0; top: 0; bottom: 0; transform: translateX(calc(100% - 40px));
      background: var(--bg-color-panel); backdrop-filter: blur(16px); border-left: 1px solid var(--input-border);
      padding: 40px 30px 30px 50px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      z-index: 100; display: flex; flex-direction: column; gap: 20px; width: 320px; overflow-y: auto;
    }
    .side-panel:hover { transform: translateX(0); }
    .panel-tab { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 24px; font-weight: bold; pointer-events: none; transition: opacity 0.3s; opacity: 0.5; }
    .side-panel:hover .panel-tab { opacity: 0; }
    
    .panel-header { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    
    /* --- Spotify Spacing Fix --- */
    #spotifyDeviceBlock { padding-top: 25px; border-top: 1px solid var(--input-border); margin-top: 10px; }
    .sp-device-select { margin-top: 10px; width: 100%; font-size: 0.85rem; padding: 10px; background: var(--input-bg); color: var(--text-primary); border: 1px solid var(--input-border); border-radius: 8px; outline: none; }

    /* --- Rest of UI --- */
    .star-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; --star-color: var(--accent); }
    .ambient-glow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s linear; }
    
    @keyframes holyPulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
    .prayer-glow-active { background: radial-gradient(circle at top, rgba(255, 215, 0, 0.35) 0%, transparent 60%) !important; animation: holyPulse 4s infinite ease-in-out !important; opacity: 1 !important; }

    .shooting-star { position: absolute; top: 50%; left: 50%; width: 0px; height: 3px; background: linear-gradient(to right, transparent 0%, var(--star-color) 80%, #ffffff 100%); border-radius: 50px; filter: drop-shadow(0 0 15px var(--star-color)); opacity: 0; transform-origin: right center; }
    .shooting-star.shoot { animation: starFly 2.5s ease-out forwards; }
    @keyframes starFly { 0% { transform: rotate(135deg) translateX(-120vmax); width: 0px; opacity: 0; } 10% { opacity: 1; width: 100px; } 100% { transform: rotate(135deg) translateX(120vmax); width: 0px; opacity: 0; } }

    .now-playing { position: fixed; top: 24px; left: 24px; display: flex; align-items: center; gap: 14px; background: var(--now-playing-bg); backdrop-filter: blur(10px); border: 1px solid var(--input-border); border-radius: 12px; padding: 12px; opacity: 0; transform: translateY(-10px); transition: all 0.5s ease; z-index: 50; }
    .now-playing.active { opacity: 1; transform: translateY(0); }
    .album-art { width: 56px; height: 56px; border-radius: 8px; background: #222; object-fit: cover; }
    
    .container { width: 100%; max-width: 500px; text-align: center; z-index: 10; pointer-events: none; }
    .display-title { font-size: 1.15rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-primary); margin-bottom: 30px; opacity: 0.8; }
    svg { width: 100%; height: auto; overflow: visible; pointer-events: auto; }

    .clock-bg { fill: var(--clock-bg); stroke: var(--clock-stroke); transition: all 0.4s; }
    .clock-inner { fill: var(--clock-inner); transition: all 0.4s; }
    .clock-text { fill: var(--text-secondary); transition: all 0.4s; }
    .clock-value { fill: var(--text-primary); cursor: pointer; }
    .handle { cursor: grab; }
    .handle.snap-back { transition: cx 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), cy 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .theme-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; }
    .theme-dot.active { border-color: var(--text-primary); transform: scale(1.15); }

    .quick-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(65px, 1fr)); gap: 8px; }
    .quick-btn { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 6px; color: var(--text-secondary); cursor: pointer; padding: 8px 4px; font-size: 0.8rem; transition: all 0.2s; }

    .ambient-info { position: fixed; bottom: 24px; left: 24px; display: flex; flex-direction: column; gap: 6px; opacity: 0.3; font-size: 0.9rem; transition: opacity 0.3s ease; pointer-events: none; }
    body:hover .ambient-info { opacity: 0.7; }
    .prayer-name { font-weight: bold; color: var(--text-primary); }

    .title-input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-primary); padding: 12px; border-radius: 8px; outline: none; }
    .spotify-btn-brand { background: #1DB954; color: white !important; font-weight: bold; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; }
  </style>
</head>
<body>

  <div id="starLayer" class="star-layer"><div id="ambientGlow" class="ambient-glow"></div><div id="shootingStar" class="shooting-star"></div></div>

  <div class="now-playing" id="nowPlaying">
    <img src="" class="album-art" id="npArt">
    <div class="track-info">
      <div style="font-weight:bold; font-size:0.9rem;" id="npTrack">Loading...</div>
      <div style="font-size:0.8rem; color:var(--text-secondary);" id="npArtist">Artist Name</div>
      <div style="display:flex; gap:12px; margin-top:8px;">
        <button style="background:none; border:none; color:white; cursor:pointer;" onclick="spotifyAction('previous')">⏮</button>
        <button style="background:none; border:none; color:white; cursor:pointer;" id="spPlayBtn" onclick="spotifyTogglePlay()">⏯</button>
        <button style="background:none; border:none; color:white; cursor:pointer;" onclick="spotifyAction('next')">⏭</button>
      </div>
    </div>
  </div>

  <div class="ambient-info">
    <div id="ambientClock">00:00 AM</div>
    <div id="ambientDate">Monday, Jan 1</div>
    <div id="ambientWeather">📍 Jeddah</div>
    <div style="font-size:0.8rem; color:var(--text-secondary);">
      <span class="prayer-name" id="prayerName">Loading...</span> <span id="prayerTime"></span> <span id="prayerCountdown" style="color:var(--accent);"></span>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-tab">‹</div>
    
    <div class="panel-header">Language / اللغة</div>
    <div class="toggle-container">
      <div id="langSlider" class="toggle-slider"></div>
      <div class="toggle-opt" id="optEn" onclick="setLanguage('en')">English</div>
      <div class="toggle-opt" id="optAr" onclick="setLanguage('ar')">العربية</div>
    </div>

    <div class="panel-header">Display Mode</div>
    <div class="toggle-container">
      <div id="modeSlider" class="toggle-slider"></div>
      <div class="toggle-opt" id="optDark" onclick="setMode('dark')">Dark</div>
      <div class="toggle-opt" id="optLight" onclick="setMode('light')">Light</div>
    </div>

    <div class="panel-header">Location</div>
    <input type="text" class="title-input" id="cityInput" value="Jeddah" />

    <div class="panel-header">Display Title</div>
    <input type="text" class="title-input" id="titleInput" value="System Standby" />
    
    <div class="panel-header">Quick Titles <span style="cursor:pointer; opacity:0.5;" onclick="editQuickTitles()">✎</span></div>
    <div class="quick-grid" id="titlesGrid"></div>

    <div class="panel-header">Quick Timers <span style="cursor:pointer; opacity:0.5;" onclick="editQuickTimers()">✎</span></div>
    <div class="quick-grid" id="timersGrid"></div>

    <div class="panel-header">Accent Color</div>
    <div class="theme-grid" id="themeGrid"></div>

    <div class="panel-header">Music (Spotify)</div>
    <div id="spotifyLoginBlock">
      <button class="spotify-btn-brand" onclick="loginSpotify()">Log in with Spotify</button>
    </div>
    
    <div id="spotifyDeviceBlock" style="display: none;">
      <div class="panel-header">Playback Device</div>
      <select class="sp-device-select" id="spDeviceSelect" onchange="spotifyTransfer(this.value)">
        <option disabled selected>Select Device</option>
      </select>
    </div>
  </div>

  <div class="container">
    <div class="display-title" id="displayTitle">System Standby</div>
    <svg id="clock" viewBox="0 0 400 400">
      <defs><linearGradient id="timerGrad"><stop offset="0%" stop-color="var(--accent)"/><stop offset="100%" stop-color="white"/></linearGradient></defs>
      <circle cx="200" cy="200" r="170" class="clock-bg" stroke-width="4" />
      <circle cx="200" cy="200" r="154" class="clock-inner" />
      <g id="ticks"></g>
      <text id="lbl12" class="clock-text" x="200" y="62" text-anchor="middle" font-size="14" font-weight="bold">12</text>
      <path id="sleepArc" fill="none" stroke="url(#timerGrad)" stroke-width="8" stroke-linecap="round" />
      <text id="timeValueText" class="clock-value" x="200" y="195" text-anchor="middle" font-size="36" font-weight="bold">00:00:00</text>
      <text id="timeLabelText" class="clock-text" x="200" y="225" text-anchor="middle" font-size="11" letter-spacing="3">REMAINING</text>
      <circle id="startHandle" cx="200" cy="40" r="6" fill="transparent" stroke="#ffffff" stroke-width="3" />
      <path id="dragString" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" d="" />
      <circle id="endHandle" cx="200" cy="40" r="8" fill="#ffffff" class="handle snap-back" />
    </svg>
  </div>

  <script>
    const SPOTIFY_CLIENT_ID = "c5a38a61e38c4f398bc51afcdf464303"; 
    const REDIRECT_URI = window.location.origin + window.location.pathname; 
    let spotifyToken = localStorage.getItem('spotify_token');
    let spotifyTokenExpiry = localStorage.getItem('spotify_token_expiry');
    let isSpotifyPlaying = false;

    const cx = 200, cy = 200, radius = 162;
    let dragging = false, prevMouseAngle = null, dragRadius = radius;
    let originalDurationMs = 15 * 60000, timerDurationMs = originalDurationMs, timerEndTime = Date.now() + timerDurationMs, isTimerRunning = true; 

    let lang = localStorage.getItem('idleLang') || 'en';
    let currentMode = localStorage.getItem('idleMode') || 'dark';
    let currentCity = localStorage.getItem('idleCity') || "Jeddah";
    let accent = localStorage.getItem('accent') || '#00c6ff';

    const translations = {
      en: { remaining: "REMAINING", paused: "PAUSED", iqamaFor: "Iqamah: ", prayerNames: { Fajr: "Fajr", Dhuhr: "Dhuhr", Asr: "Asr", Maghrib: "Maghrib", Isha: "Isha" } },
      ar: { remaining: "المتبقي", paused: "متوقف", iqamaFor: "الإقامة: ", prayerNames: { Fajr: "الفجر", Dhuhr: "الظهر", Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء" } }
    };

    function setLanguage(l) {
      lang = l; localStorage.setItem('idleLang', l);
      document.body.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
      document.getElementById('langSlider').classList.toggle('lang-slide', l === 'ar');
      document.querySelectorAll('.toggle-opt').forEach(el => el.classList.remove('active'));
      document.getElementById(l === 'en' ? 'optEn' : 'optAr').classList.add('active');
      updateLiveTimer();
    }

    function setMode(m) {
      currentMode = m; localStorage.setItem('idleMode', m);
      document.body.classList.toggle('light-mode', m === 'light');
      document.getElementById('modeSlider').classList.toggle('mode-slide-right', m === 'light');
      document.getElementById('optDark').classList.toggle('active', m === 'dark');
      document.getElementById('optLight').classList.toggle('active', m === 'light');
    }

    function applyTheme(c) {
      accent = c; localStorage.setItem('accent', c);
      document.documentElement.style.setProperty('--accent', c);
      document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.color === c));
      updateLiveTimer();
    }

    // Timer Logic
    function updateLiveTimer() {
      const now = Date.now();
      const d = new Date();
      document.getElementById('ambientClock').textContent = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      document.getElementById('ambientDate').textContent = d.toLocaleDateString(lang === 'en' ? 'en-US' : 'ar-SA', {weekday:'long', month:'short', day:'numeric'});
      
      let diffMs = isTimerRunning ? timerEndTime - now : timerDurationMs;
      if (diffMs <= 0 && isTimerRunning) { isTimerRunning = false; diffMs = originalDurationMs; triggerShootingStar(); spotifyAction('pause'); }
      
      const timeStr = new Date(Math.abs(diffMs)).toISOString().substr(11, 8);
      document.getElementById('timeValueText').textContent = timeStr;
      document.getElementById('timeLabelText').textContent = isTimerRunning ? translations[lang].remaining : translations[lang].paused;
      
      const angle = ((diffMs / 43200000) * 360); // Simple 12h scale
      const end = polarToCartesian(cx, cy, radius, angle);
      document.getElementById('sleepArc').setAttribute("d", describeArc(cx, cy, radius, 0, angle));
      document.getElementById('endHandle').setAttribute("cx", end.x);
      document.getElementById('endHandle').setAttribute("cy", end.y);
    }

    function polarToCartesian(x, y, r, deg) { const rad = (deg - 90) * Math.PI / 180.0; return { x: x + (r * Math.cos(rad)), y: y + (r * Math.sin(rad)) }; }
    function describeArc(x, y, r, start, end) { const s = polarToCartesian(x, y, r, start), e = polarToCartesian(x, y, r, end); return ["M", s.x, s.y, "A", r, r, 0, (end - start <= 180 ? "0" : "1"), 1, e.x, e.y].join(" "); }
    function triggerShootingStar() { document.getElementById('shootingStar').classList.add('shoot'); setTimeout(()=>document.getElementById('shootingStar').classList.remove('shoot'), 2500); }

    // Ticks
    const tg = document.getElementById('ticks');
    for(let i=0; i<60; i++) {
      const p1 = polarToCartesian(cx, cy, i%5===0?158:162, i*6), p2 = polarToCartesian(cx, cy, 168, i*6);
      const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
      l.setAttribute("x1", p1.x); l.setAttribute("y1", p1.y); l.setAttribute("x2", p2.x); l.setAttribute("y2", p2.y);
      l.setAttribute("stroke", "rgba(120,120,120,0.3)"); l.setAttribute("stroke-width", i%5===0?2:1);
      tg.appendChild(l);
    }

    // Spotify PKCE & Prayer logic (Standard from previous step)
    async function loginSpotify() { window.location.href = `https://accounts.spotify.com/authorize?client_id=${SPOTIFY_CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=user-read-playback-state user-modify-playback-state`; }
    
    // Init
    setLanguage(lang); setMode(currentMode); 
    const colors = ['#00c6ff', '#ff758c', '#ffffff', '#ff4757', '#8E2DE2', '#0ba360', '#f12711', '#00F260'];
    colors.forEach(c => {
      const d = document.createElement('div'); d.className='theme-dot'; d.style.background=c; d.dataset.color=c;
      d.onclick = () => applyTheme(c); document.getElementById('themeGrid').appendChild(d);
    });
    setInterval(updateLiveTimer, 1000); applyTheme(accent);
  </script>
</body>
</html>
